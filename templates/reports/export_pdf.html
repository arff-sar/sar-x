<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: DejaVu Sans, sans-serif; font-size: 10px; color: #0f172a; }
    h1 { font-size: 18px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #cbd5e1; padding: 6px; text-align: left; }
    th { background: #e2e8f0; }
    .meta { margin-top: 8px; color: #475569; }
  </style>
</head>
<body>
  <h1>{{ report_data.label }}</h1>
  <div class="meta">Trend: {{ filters.trend_days }} gün</div>
  <table>
    <thead>
      <tr>
        {% for column in report_data.columns %}
        <th>{{ column }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for row in report_data.rows %}
      <tr>
        {% for column in report_data.columns %}
        <td>{{ row[column] }}</td>
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
