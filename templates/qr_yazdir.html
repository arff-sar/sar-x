<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>{{ qr_context.asset_code }} - QR Etiketi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }
        .label-sheet {
            width: 100%;
            max-width: 360px;
        }
        .label-card {
            background: #ffffff;
            border: 2px solid #0f172a;
            border-radius: 18px;
            padding: 24px 24px 20px;
            text-align: center;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
        }
        .label-topline {
            font-size: 11px;
            font-weight: 800;
            color: #475569;
            letter-spacing: .16em;
            text-transform: uppercase;
        }
        .label-title {
            margin-top: 8px;
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
        }
        .label-subtitle {
            margin-top: 4px;
            font-size: 12px;
            color: #64748b;
        }
        .qr-frame {
            margin: 18px auto 16px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 14px;
            background: #f8fafc;
        }
        .qr-image {
            display: block;
            width: 100%;
            max-width: 220px;
            margin: 0 auto;
        }
        .asset-code {
            margin-top: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: .06em;
        }
        .airport-name {
            margin-top: 8px;
            font-size: 14px;
            font-weight: 800;
            color: #334155;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        .meta-row {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed #cbd5e1;
            font-size: 11px;
            color: #64748b;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        .print-btn {
            width: 100%;
            margin-top: 16px;
            background: #0f2d4a;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
        }
        @media print {
            body { background: #fff; padding: 0; }
            .label-card { box-shadow: none; }
            .print-btn { display: none; }
        }
    </style>
</head>
<body>
    <div class="label-sheet">
        <div class="label-card">
            <div class="label-topline">ARFF Operational Asset Label</div>
            <div class="label-title">{{ asset.equipment_template.name if asset.equipment_template else asset.legacy_material.ad }}</div>
            <div class="label-subtitle">Saha tarama ve hizli ekipman takibi</div>

            <div class="qr-frame">
                <img src="{{ url_for('inventory.qr_img', asset_id=asset.id) }}" alt="QR Kod" class="qr-image">
            </div>

            <div class="asset-code">{{ qr_context.asset_code }}</div>
            <div class="airport-name">{{ qr_context.airport_name }}</div>

            <div class="meta-row">
                <span>{{ asset.serial_no or 'Seri No Yok' }}</span>
                <span>{{ asset.depot_location or 'Konum Yok' }}</span>
            </div>
        </div>

        <button class="print-btn" onclick="window.print()">Etiketi Yazdir</button>
    </div>
</body>
</html>
