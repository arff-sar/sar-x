<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Yeni Şifre Belirle — SAR-X ARFF</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f2d4a">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;800&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f0f4f8; --surface: #ffffff; --surface2: #f8fafc;
            --navy: #0f2d4a; --orange: #f97316;
            --border: #e2e8f0; --border-dark: #cbd5e1;
            --text: #0f172a; --text2: #334155; --text3: #64748b;
            --sans: 'Plus Jakarta Sans', sans-serif;
            --r-xl: 18px; --r: 10px;
        }
        body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border-dark); border-radius: var(--r-xl); overflow: hidden; box-shadow: 0 8px 40px rgba(15,45,74,.1); }
        .login-header { background: var(--navy); padding: 32px 32px 28px; text-align: center; }
        .login-logo-mark { width: 56px; height: 56px; background: var(--orange); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(249,115,22,.4); margin-bottom: 16px; }
        .login-logo-mark svg { width: 28px; height: 28px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        .login-title { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -.02em; }
        .login-body { padding: 28px 32px 32px; }
        .field-group { margin-bottom: 18px; }
        .field-label { font-size: 12.5px; font-weight: 700; color: var(--text2); margin-bottom: 7px; display: block; }
        .field-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border-dark); border-radius: var(--r); color: var(--text); font-family: var(--sans); font-size: 14px; padding: 12px 14px; outline: none; transition: border-color .2s; }
        .field-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,.12); }
        .login-btn-submit { width: 100%; background: var(--orange); color: #fff; border: none; border-radius: var(--r); padding: 14px; font-family: var(--sans); font-size: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 3px 14px rgba(249,115,22,.3); transition: transform .1s; margin-top: 10px; }
        .login-btn-submit:hover { transform: translateY(-1px); }
        .help-text { font-size: 11px; color: var(--text3); margin-top: 5px; line-height: 1.4; display: block; }
        .error-message { font-size: 12px; color: #dc2626; font-weight: 600; display: none; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="login-logo-mark">
                <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V7L12 2z"/><path d="M9 12l2 2 4-4"/></svg>
            </div>
            <div class="login-title">Yeni Şifre Belirle</div>
        </div>

        <div class="login-body">
            <p style="font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5;">
                <b>{{ email }}</b> hesabı için yeni ve güvenli bir şifre belirliyorsunuz.
            </p>

            <form method="POST" action="{{ url_for('auth.sifre_yenile', token=token) }}" id="resetForm">
                
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="field-group">
                    <label class="field-label">YENİ ŞİFRE</label>
                    <input type="password" id="sifre1" name="yeni_sifre" class="field-input" placeholder="••••••••" required 
                           minlength="8" 
                           pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*?[#?!@$%^&*-]).{8,}">
                    <span class="help-text">💡 En az 8 karakter uzunluğunda olmalı; 1 büyük harf, 1 rakam ve 1 özel simge (!@#$ vb.) içermelidir.</span>
                </div>

                <div class="field-group">
                    <label class="field-label">YENİ ŞİFRE (TEKRAR)</label>
                    <input type="password" id="sifre2" class="field-input" placeholder="••••••••" required>
                    <div id="matchError" class="error-message">⚠️ Girdiğiniz şifreler birbiriyle uyuşmuyor!</div>
                </div>

                <button type="submit" class="login-btn-submit">Şifreyi Güncelle ve Giriş Yap</button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const s1 = document.getElementById('sifre1');
        const s2 = document.getElementById('sifre2');
        const err = document.getElementById('matchError');

        form.addEventListener('submit', function(e) {
            if (s1.value !== s2.value) {
                e.preventDefault();
                err.style.display = 'block';
                s2.focus();
            } else {
                err.style.display = 'none';
            }
        });
    </script>
</body>
</html>
