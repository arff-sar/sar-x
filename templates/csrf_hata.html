<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenlik Doğrulaması</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7fb; color: #0f172a; margin: 0; }
        .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
        .card { max-width: 560px; width: 100%; background: #fff; border: 1px solid #dbe3ec; border-radius: 12px; padding: 28px; }
        h1 { margin: 0 0 12px; font-size: 24px; color: #0f2d4a; }
        p { margin: 0 0 18px; line-height: 1.6; color: #334155; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        a, button { border: 0; cursor: pointer; padding: 10px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; }
        a { background: #0f2d4a; color: #fff; }
        button { background: #e2e8f0; color: #0f172a; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>CSRF Güvenlik Kontrolü</h1>
        <p>{{ mesaj or "İsteğiniz güvenlik doğrulamasından geçemedi. Sayfayı yenileyip tekrar deneyin." }}</p>
        {% if error_code %}
        <p><strong>Hata kodu:</strong> {{ error_code }}<br>{% if support_note %}{{ support_note }}{% endif %}</p>
        {% endif %}
        <div class="actions">
            <a href="{{ url_for('auth.login') }}">Giriş Sayfasına Dön</a>
            <button type="button" onclick="history.back()">Geri Git</button>
        </div>
    </div>
</div>
</body>
</html>
